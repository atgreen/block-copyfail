apiVersion: v1
kind: Namespace
metadata:
  annotations:
    openshift.io/description: "Block / Detect CopyFail exploitation attempts"
    openshift.io/display-name: "CopyFail - Block / Detect Execution"
    security.openshift.io/MinimallySufficientPodSecurityStandard: privileged
  labels:
    kubernetes.io/metadata.name: copyfail
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/warn-version: latest
  name: copyfail
