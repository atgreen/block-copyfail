---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: block-copyfail
  namespace: block-copyfail
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: block-copyfail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: block-copyfail
subjects:
- kind: ServiceAccount
  name: block-copyfail
  namespace: block-copyfail
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: block-copyfail
rules:
- apiGroups:
  - security.openshift.io
  resourceNames:
  - privileged
  resources:
  - securitycontextconstraints
  verbs:
  - use
